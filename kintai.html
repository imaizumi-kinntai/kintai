<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠管理帳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --washi:        #f5f0e8;
  --washi-dark:   #ede6d6;
  --washi-deeper: #e0d5c0;
  --ink:          #1a1208;
  --ink-light:    #3d3020;
  --ink-faint:    #7a6a50;
  --vermilion:    #c0392b;
  --vermilion-l:  #e8534a;
  --indigo:       #2c3e6b;
  --indigo-l:     #3d5080;
  --gold:         #8b6914;
  --gold-l:       #b8891c;
  --moss:         #4a6741;
  --moss-l:       #5e8354;
  --border:       #c8b99a;
  --border-l:     #ddd0b8;
  --shadow:       rgba(60,40,10,0.15);
  --shadow-d:     rgba(60,40,10,0.28);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{
  font-family:'Noto Serif JP',serif;
  background-color:var(--washi);
  color:var(--ink);
  min-height:100vh;
  background-image:url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='400' height='400' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-attachment:fixed;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(160,130,80,0.07) 59px,rgba(160,130,80,0.07) 60px);
  pointer-events:none;z-index:0;
}

/* ===== 名前入力画面 ===== */
#nameScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
.name-box{
  background:rgba(255,252,245,0.92);border:2px solid var(--border);border-radius:2px;
  padding:56px 64px;width:440px;max-width:94vw;text-align:center;
  box-shadow:0 8px 40px var(--shadow-d),inset 0 1px 0 rgba(255,255,255,0.7);position:relative;
}
.name-box::before{content:'';position:absolute;top:8px;left:8px;right:8px;bottom:8px;border:1px solid var(--border-l);border-radius:1px;pointer-events:none;}
.hanko{
  display:inline-flex;align-items:center;justify-content:center;
  width:64px;height:64px;border:3px solid var(--vermilion);border-radius:50%;
  color:var(--vermilion);font-size:11px;font-weight:700;letter-spacing:0.12em;line-height:1.3;
  margin-bottom:24px;writing-mode:vertical-rl;transform:rotate(-8deg);
  box-shadow:0 2px 8px rgba(192,57,43,0.25);
}
.name-title{font-size:22px;font-weight:600;letter-spacing:0.18em;margin-bottom:8px;}
.name-subtitle{font-size:12px;color:var(--ink-faint);letter-spacing:0.12em;margin-bottom:36px;font-family:'Noto Sans JP',sans-serif;}
.name-input-wrap{margin-bottom:12px;}
.washi-input{
  width:100%;background:rgba(240,232,215,0.5);border:none;border-bottom:2px solid var(--border);
  padding:12px 8px;font-family:'Noto Serif JP',serif;font-size:17px;color:var(--ink);
  text-align:center;outline:none;letter-spacing:0.12em;transition:border-color 0.2s;
}
.washi-input:focus{border-bottom-color:var(--vermilion);}
.washi-input::placeholder{color:var(--border);font-size:14px;}
.name-list{display:flex;flex-direction:column;gap:0;margin-bottom:28px;position:relative;}
.name-suggest{
  background:rgba(255,252,245,0.98);border:1px solid var(--border);border-radius:2px;
  overflow:hidden;box-shadow:0 4px 16px var(--shadow);
}
.name-chip{
  display:block;width:100%;text-align:left;
  background:transparent;border:none;border-bottom:1px solid var(--border-l);
  padding:10px 16px;font-size:14px;cursor:pointer;transition:all 0.12s;
  color:var(--ink-light);font-family:'Noto Sans JP',sans-serif;letter-spacing:0.08em;
}
.name-chip:last-child{border-bottom:none;}
.name-chip:hover{background:var(--indigo);color:#fff;}
.name-chip mark{background:transparent;color:var(--vermilion);font-weight:700;}

/* ===== ボタン共通 ===== */
.washi-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 32px;font-family:'Noto Serif JP',serif;font-size:15px;
  letter-spacing:0.18em;cursor:pointer;border:none;border-radius:1px;
  transition:all 0.18s;position:relative;
}
.btn-vermilion{background:var(--vermilion);color:#fff;box-shadow:0 3px 14px rgba(192,57,43,0.35),inset 0 1px 0 rgba(255,255,255,0.15);}
.btn-vermilion:hover{background:var(--vermilion-l);transform:translateY(-1px);}
.btn-vermilion:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-indigo{background:var(--indigo);color:#fff;box-shadow:0 3px 14px rgba(44,62,107,0.35);}
.btn-indigo:hover{background:var(--indigo-l);transform:translateY(-1px);}
.btn-indigo:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-moss{background:var(--moss);color:#fff;box-shadow:0 3px 14px rgba(74,103,65,0.35);}
.btn-moss:hover{background:var(--moss-l);transform:translateY(-1px);}
.btn-moss:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-gold{background:var(--gold);color:#fff;box-shadow:0 3px 14px rgba(139,105,20,0.35);}
.btn-gold:hover{background:var(--gold-l);transform:translateY(-1px);}
.btn-gold:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-outline{background:transparent;color:var(--ink-light);border:1px solid var(--border);}
.btn-outline:hover{background:var(--washi-dark);}
.btn-sm{padding:6px 14px;font-size:12px;letter-spacing:0.1em;}

/* ===== メイン画面 ===== */
#mainScreen{display:none;position:relative;z-index:1;min-height:100vh;flex-direction:column;}
#mainScreen.active{display:flex;}
.header{
  background:rgba(26,18,8,0.94);color:#f5f0e8;padding:0 24px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 12px var(--shadow-d);position:sticky;top:0;z-index:50;
}
.header-title{font-size:18px;letter-spacing:0.28em;font-weight:600;}
.header-title span{font-size:11px;opacity:0.5;letter-spacing:0.12em;margin-left:14px;font-family:'Noto Sans JP',sans-serif;}
.header-right{display:flex;align-items:center;gap:14px;}
.header-user{font-size:13px;letter-spacing:0.1em;opacity:0.85;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;gap:6px;}
.header-user::before{content:'●';color:var(--vermilion-l);font-size:8px;}

/* ===== タブ ===== */
.tabs{background:rgba(26,18,8,0.05);border-bottom:1px solid var(--border);display:flex;padding:0 24px;}
.tab{
  padding:14px 28px;font-size:13px;letter-spacing:0.16em;color:var(--ink-faint);
  cursor:pointer;border-bottom:3px solid transparent;transition:all 0.18s;
  font-family:'Noto Sans JP',sans-serif;background:none;border-top:none;border-left:none;border-right:none;
  white-space:nowrap;
}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--vermilion);border-bottom-color:var(--vermilion);font-weight:500;}

/* ===== コンテンツ ===== */
.content{flex:1;padding:28px 24px;max-width:860px;margin:0 auto;width:100%;}
.panel{display:none;animation:fadeIn 0.25s ease;}
.panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ===== 打刻パネル ===== */
.date-header{text-align:center;margin-bottom:24px;padding:20px;background:rgba(255,252,245,0.7);border:1px solid var(--border-l);position:relative;}
.date-header::before{content:'勤怠記録';position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--washi);padding:0 12px;font-size:11px;letter-spacing:0.2em;color:var(--ink-faint);}
.today-date{font-size:26px;font-weight:600;letter-spacing:0.1em;}
.today-time{font-size:44px;font-weight:300;letter-spacing:0.06em;line-height:1.1;margin:4px 0;font-variant-numeric:tabular-nums;}
.today-weekday{font-size:12px;color:var(--ink-faint);letter-spacing:0.2em;}

.section-label{font-size:11px;letter-spacing:0.22em;color:var(--ink-faint);margin-bottom:10px;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border-l);}

/* パターン選択 */
.pattern-section{margin-bottom:22px;}
.pattern-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pattern-card{background:rgba(255,252,245,0.8);border:1px solid var(--border);border-radius:2px;padding:16px 12px;text-align:center;cursor:pointer;transition:all 0.18s;font-family:'Noto Sans JP',sans-serif;}
.pattern-card:hover{background:var(--washi-dark);border-color:var(--ink-faint);}
.pattern-card.selected{background:var(--indigo);border-color:var(--indigo);color:#fff;box-shadow:0 3px 12px rgba(44,62,107,0.3);}
.pattern-card.selected .pattern-sub{color:rgba(255,255,255,0.65);}
.pattern-icon{font-size:22px;margin-bottom:6px;}
.pattern-name{font-size:14px;font-weight:500;letter-spacing:0.1em;}
.pattern-sub{font-size:10px;color:var(--ink-faint);margin-top:3px;}

/* 状態バー */
.status-bar{background:rgba(255,252,245,0.7);border:1px solid var(--border-l);border-radius:2px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;font-family:'Noto Sans JP',sans-serif;font-size:13px;flex-wrap:wrap;gap:10px;}
.status-item{display:flex;flex-direction:column;align-items:center;gap:3px;}
.status-item-label{font-size:10px;color:var(--ink-faint);letter-spacing:0.1em;}
.status-item-val{font-size:15px;color:var(--ink);font-weight:500;}
.status-item-val.empty{color:var(--border);}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.1em;}
.badge-out{background:rgba(120,100,70,0.12);color:var(--ink-faint);}
.badge-in{background:rgba(74,103,65,0.12);color:var(--moss);}
.badge-break{background:rgba(139,105,20,0.12);color:var(--gold);}
.badge-done{background:rgba(44,62,107,0.12);color:var(--indigo);}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.badge-in .badge-dot,.badge-break .badge-dot{animation:blinkDot 2s infinite;}
@keyframes blinkDot{0%,100%{opacity:1}50%{opacity:0.3}}

/* 打刻ボタン */
.stamp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
.stamp-btn{padding:18px 12px;font-size:14px;letter-spacing:0.14em;border-radius:2px;font-family:'Noto Sans JP',sans-serif;font-weight:500;position:relative;overflow:hidden;flex-direction:column;}
.stamp-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.12) 0%,transparent 60%);}
.stamp-time{display:block;font-size:11px;opacity:0.7;margin-top:4px;letter-spacing:0.05em;}

/* メモ */
.memo-section{margin-bottom:20px;}
.washi-textarea{width:100%;background:rgba(240,232,215,0.4);border:1px solid var(--border-l);border-radius:1px;padding:12px 14px;font-family:'Noto Serif JP',serif;font-size:14px;color:var(--ink);resize:vertical;min-height:72px;outline:none;line-height:1.8;letter-spacing:0.04em;transition:border-color 0.2s;}
.washi-textarea:focus{border-color:var(--border);}
.washi-textarea::placeholder{color:var(--border);font-size:13px;}

/* ===== 履歴タブ ===== */
.history-filter{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.month-nav-btn{width:32px;height:32px;background:rgba(255,252,245,0.8);border:1px solid var(--border);border-radius:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--ink-light);transition:all 0.15s;}
.month-nav-btn:hover{background:var(--washi-dark);}
.month-label{font-size:16px;font-weight:600;letter-spacing:0.16em;min-width:100px;text-align:center;}
.filter-select{background:rgba(255,252,245,0.8);border:1px solid var(--border);border-radius:1px;padding:6px 12px;font-family:'Noto Serif JP',serif;font-size:13px;color:var(--ink);outline:none;cursor:pointer;}

.record-card{background:rgba(255,252,245,0.85);border:1px solid var(--border-l);border-radius:2px;padding:16px 20px;margin-bottom:10px;position:relative;transition:box-shadow 0.18s;}
.record-card:hover{box-shadow:0 4px 16px var(--shadow);}
.record-date{font-size:14px;font-weight:600;letter-spacing:0.1em;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.pattern-badge{font-size:10px;padding:2px 10px;border-radius:20px;font-family:'Noto Sans JP',sans-serif;font-weight:500;}
.pb-full{background:rgba(74,103,65,0.12);color:var(--moss);}
.pb-am{background:rgba(44,62,107,0.12);color:var(--indigo);}
.pb-pm{background:rgba(139,105,20,0.12);color:var(--gold);}
.record-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;}
.record-item{display:flex;flex-direction:column;gap:3px;}
.record-item-label{font-size:10px;color:var(--ink-faint);letter-spacing:0.08em;}
.record-item-val{color:var(--ink-light);font-weight:500;}
.record-memo{margin-top:10px;font-size:12px;color:var(--ink-faint);font-family:'Noto Serif JP',serif;padding-top:10px;border-top:1px solid var(--border-l);line-height:1.6;}
.record-actions{position:absolute;top:12px;right:14px;display:flex;gap:6px;}
.icon-btn{width:28px;height:28px;background:none;border:1px solid var(--border-l);border-radius:1px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);transition:all 0.15s;}
.icon-btn:hover{background:var(--washi-dark);color:var(--ink);}
.icon-btn.danger:hover{background:var(--vermilion);border-color:var(--vermilion);color:#fff;}
.empty-state{text-align:center;padding:60px 20px;color:var(--ink-faint);font-family:'Noto Sans JP',sans-serif;}
.empty-icon{font-size:40px;margin-bottom:16px;opacity:0.4;}
.empty-text{font-size:14px;letter-spacing:0.1em;}

/* ===== 集計タブ ===== */
.summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:24px;}
.summary-card{background:rgba(255,252,245,0.85);border:1px solid var(--border-l);border-radius:2px;padding:20px 22px;position:relative;overflow:hidden;}
.summary-card::after{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.sc-moss::after{background:var(--moss);}
.sc-indigo::after{background:var(--indigo);}
.sc-gold::after{background:var(--gold);}
.sc-vermilion::after{background:var(--vermilion);}
.sc-label{font-size:11px;letter-spacing:0.18em;color:var(--ink-faint);margin-bottom:8px;font-family:'Noto Sans JP',sans-serif;}
.sc-value{font-size:32px;font-weight:300;color:var(--ink);line-height:1;}
.sc-value sup{font-size:14px;font-weight:400;margin-left:4px;vertical-align:baseline;color:var(--ink-faint);}
.sc-sub{font-size:11px;color:var(--ink-faint);margin-top:6px;font-family:'Noto Sans JP',sans-serif;}
.washi-table{width:100%;border-collapse:collapse;font-family:'Noto Sans JP',sans-serif;font-size:13px;}
.washi-table th{background:rgba(26,18,8,0.06);padding:10px 14px;text-align:left;font-size:10px;letter-spacing:0.14em;color:var(--ink-faint);border-bottom:1px solid var(--border);font-weight:600;}
.washi-table td{padding:11px 14px;border-bottom:1px solid var(--border-l);color:var(--ink-light);}
.washi-table tr:hover td{background:rgba(255,252,245,0.7);}
.washi-table tr:last-child td{border-bottom:none;}

/* ===== モーダル ===== */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26,18,8,0.60);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex !important;}
.modal{
  background:var(--washi);border:1px solid var(--border);border-radius:2px;
  padding:28px 32px 20px;width:460px;max-width:94vw;
  max-height:88vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  box-shadow:0 16px 48px var(--shadow-d);animation:modalIn 0.22s ease;position:relative;
}
@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(10px);}to{opacity:1;transform:none;}}
.modal::before{content:'';position:absolute;top:6px;left:6px;right:6px;bottom:6px;border:1px solid var(--border-l);border-radius:1px;pointer-events:none;opacity:0.4;}
.modal-title{font-size:17px;font-weight:600;letter-spacing:0.18em;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.modal-title::before{content:'│';color:var(--vermilion);font-weight:300;}
.form-row{margin-bottom:14px;}
.form-label{display:block;font-size:11px;letter-spacing:0.18em;color:var(--ink-faint);margin-bottom:6px;font-family:'Noto Sans JP',sans-serif;}
.form-time-input{background:rgba(240,232,215,0.5);border:none;border-bottom:2px solid var(--border);padding:8px 8px;font-family:'Noto Serif JP',serif;font-size:20px;color:var(--ink);width:160px;outline:none;letter-spacing:0.08em;transition:border-color 0.2s;}
.form-time-input:focus{border-bottom-color:var(--vermilion);}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;padding-top:14px;border-top:1px solid var(--border-l);position:sticky;bottom:0;background:var(--washi);z-index:1;}

/* ===== Toast ===== */
.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:300;pointer-events:none;}
.toast{background:rgba(26,18,8,0.92);color:#f5f0e8;border-radius:2px;padding:12px 20px;font-size:13px;letter-spacing:0.08em;font-family:'Noto Sans JP',sans-serif;animation:toastIn 0.25s ease,toastOut 0.3s ease 2.7s forwards;box-shadow:0 4px 20px var(--shadow-d);display:flex;align-items:center;gap:10px;}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:none;}}
@keyframes toastOut{to{opacity:0;transform:translateX(20px);}}

::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ===== 打刻タブ 日付選択 ===== */
.stamp-date-bar {
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  margin-bottom:16px;
  background:rgba(255,252,245,0.7);border:1px solid var(--border-l);
  border-radius:2px;padding:12px 16px;
}
.stamp-date-label { font-size:11px;letter-spacing:0.18em;color:var(--ink-faint);font-family:'Noto Sans JP',sans-serif;white-space:nowrap; }
.stamp-date-display { font-size:15px;font-weight:600;letter-spacing:0.1em;flex:1; }
.btn-date-today {
  background:var(--washi-dark);border:1px solid var(--border);border-radius:1px;
  padding:5px 12px;font-size:11px;font-family:'Noto Sans JP',sans-serif;
  color:var(--ink-faint);cursor:pointer;transition:all 0.15s;white-space:nowrap;
}
.btn-date-today:hover { border-color:var(--vermilion);color:var(--vermilion); }
.btn-date-today.active { background:var(--vermilion);border-color:var(--vermilion);color:#fff; }
.washi-date-input {
  background:rgba(240,232,215,0.5);border:none;border-bottom:2px solid var(--border);
  padding:6px 6px;font-family:'Noto Serif JP',serif;font-size:14px;color:var(--ink);
  outline:none;transition:border-color 0.2s;
}
.washi-date-input:focus { border-bottom-color:var(--vermilion); }

/* ===== 集計・履歴 月切替ボタン ===== */
.month-switch { display:flex;gap:8px; }
.btn-month-switch {
  padding:6px 18px;font-size:12px;letter-spacing:0.1em;
  font-family:'Noto Sans JP',sans-serif;cursor:pointer;
  border:1px solid var(--border);border-radius:1px;
  background:var(--washi-dark);color:var(--ink-faint);
  transition:all 0.15s;
}
.btn-month-switch:hover { border-color:var(--ink-faint);color:var(--ink); }
.btn-month-switch.active { background:var(--indigo);border-color:var(--indigo);color:#fff; }
.washi-table tr.row-weekend td { background: rgba(160,130,80,0.05); color: var(--ink-faint); }
.washi-table tr.row-today td   { background: rgba(192,57,43,0.05); }
.washi-table tr.row-today .cal-date { color: var(--vermilion); font-weight:700; }
.washi-table tr.row-empty td   { color: var(--border); }
.cal-date { font-size:13px; white-space:nowrap; }
.cal-day  { font-size:10px; margin-left:4px; color:var(--ink-faint); }
.cal-day-sun { color: var(--vermilion) !important; }
.cal-day-sat { color: var(--indigo) !important; }

.btn-add-row {
  background: none;
  border: 1px dashed var(--border);
  border-radius:1px;
  padding: 3px 10px;
  font-size:11px;
  color: var(--ink-faint);
  cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;
  transition:all 0.15s;
  white-space:nowrap;
}
.btn-add-row:hover { border-color:var(--moss); color:var(--moss); background:rgba(74,103,65,0.06); }

/* 履歴タブ 追加ボタン行 */
.history-add-bar {
  display:flex;
  justify-content:flex-end;
  margin-bottom:14px;
}
@media(max-width:480px){
  /* 名前入力画面 */
  .name-box{padding:36px 20px;}
  .hanko{width:52px;height:52px;font-size:10px;}
  .name-title{font-size:18px;}
  .name-subtitle{font-size:11px;margin-bottom:24px;}

  /* ヘッダー */
  .header{padding:0 12px;height:52px;}
  .header-title{font-size:14px;letter-spacing:0.14em;}
  .header-title span{display:none;} /* サブタイトル非表示 */
  .header-user{font-size:12px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .washi-btn.btn-outline.btn-sm{padding:5px 10px;font-size:11px;letter-spacing:0.06em;}

  /* タブ */
  .tabs{padding:0;}
  .tab{flex:1;padding:12px 4px;font-size:12px;letter-spacing:0.08em;text-align:center;}

  /* コンテンツ */
  .content{padding:14px 10px;}

  /* 時計エリア */
  .date-header{padding:14px 10px;margin-bottom:16px;}
  .today-date{font-size:16px;}
  .today-time{font-size:34px;}
  .today-weekday{font-size:11px;}

  /* パターン選択 — 横3列をそのまま維持するが高さを詰める */
  .pattern-grid{grid-template-columns:repeat(3,1fr);gap:6px;}
  .pattern-card{padding:10px 4px;}
  .pattern-icon{font-size:18px;margin-bottom:4px;}
  .pattern-name{font-size:12px;letter-spacing:0.04em;}
  .pattern-sub{font-size:9px;}

  /* ステータスバー — 2列グリッドに */
  .status-bar{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px 16px;
    padding:12px 14px;
  }
  .status-item:first-child{grid-column:1/-1;} /* 「現在の状態」は全幅 */
  .status-item-label{font-size:9px;}
  .status-item-val{font-size:14px;}

  /* 打刻ボタン — 2列・タップしやすい高さ */
  .stamp-grid{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
  .stamp-btn{padding:20px 8px;font-size:13px;letter-spacing:0.06em;}
  .stamp-time{font-size:10px;}

  /* section-label */
  .section-label{font-size:10px;margin-bottom:8px;}

  /* メモ */
  .washi-textarea{font-size:13px;min-height:60px;padding:10px 12px;}

  /* アクションボタン行 */
  .content > div[style*="flex-end"]{flex-wrap:wrap;gap:8px;}
  .washi-btn.btn-sm{padding:9px 12px;font-size:12px;}

  /* 履歴カード */
  .record-card{padding:12px 12px;}
  .record-date{font-size:12px;flex-wrap:wrap;}
  .record-grid{grid-template-columns:repeat(3,1fr);gap:6px;}
  .record-item-label{font-size:9px;}
  .record-item-val{font-size:12px;}
  .record-memo{font-size:11px;}
  .record-actions{top:8px;right:8px;}
  .icon-btn{width:26px;height:26px;font-size:12px;}

  /* 集計カード */
  .summary-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .sc-label{font-size:10px;letter-spacing:0.1em;}
  .sc-value{font-size:26px;}
  .sc-sub{font-size:10px;}

  /* 集計テーブル — 横スクロール */
  .washi-table{font-size:11px;}
  .washi-table th,.washi-table td{padding:8px 8px;}
  div:has(> .washi-table){overflow-x:auto;-webkit-overflow-scrolling:touch;}

  /* モーダル */
  .modal{padding:24px 18px;}
  .modal-title{font-size:15px;margin-bottom:16px;}
  .form-time-input{width:100%;font-size:18px;}
  .form-row{margin-bottom:14px;}
  .modal-actions{margin-top:20px;gap:8px;}

  /* トースト — 画面下中央 */
  .toast-wrap{right:50%;transform:translateX(50%);bottom:16px;width:90vw;align-items:center;}
  .toast{width:100%;justify-content:center;font-size:12px;padding:10px 14px;}

  /* フィルター行 */
  .history-filter{gap:8px;}
  .month-label{font-size:14px;min-width:80px;}
  .filter-select{font-size:12px;padding:5px 8px;}
}

/* ===== タブレット対応 (481〜700px) ===== */
@media(min-width:481px) and (max-width:700px){
  .stamp-grid{grid-template-columns:repeat(2,1fr);}
  .record-grid{grid-template-columns:repeat(3,1fr);}
  .summary-grid{grid-template-columns:repeat(2,1fr);}
  .content{padding:20px 16px;}
  .name-box{padding:44px 36px;}
  .form-time-input{width:100%;}
  .toast-wrap{right:50%;transform:translateX(50%);width:80vw;align-items:center;}
  .toast{width:100%;justify-content:center;}
}
</style>
</head>
<body>

<!-- ===== 名前入力画面 ===== -->
<div id="nameScreen">
  <div class="name-box">
    <div class="hanko">勤怠</div>
    <div class="name-title">勤怠管理帳</div>
    <div class="name-subtitle">KINTAI KANRI — ATTENDANCE RECORD</div>
    <div class="name-input-wrap">
      <input class="washi-input" type="text" id="nameInput" placeholder="お名前を入力してください" maxlength="20" autocomplete="off">
    </div>
    <div class="name-list" id="nameList"></div>
    <button class="washi-btn btn-vermilion" onclick="startSession()">入　場</button>
  </div>
</div>

<!-- ===== メイン画面 ===== -->
<div id="mainScreen">
  <header class="header">
    <div class="header-title">勤怠管理帳<span>KINTAI KANRI</span></div>
    <div class="header-right">
      <div class="header-user" id="headerUser"></div>
      <button class="washi-btn btn-outline btn-sm" onclick="logout()">退　出</button>
    </div>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('stamp',this)">打　刻</button>
    <button class="tab" onclick="switchTab('history',this)">履　歴</button>
    <button class="tab" onclick="switchTab('summary',this)">集　計</button>
  </div>

  <div class="content">

    <!-- 打刻タブ -->
    <div id="panel-stamp" class="panel active">

      <div class="date-header">
        <div class="today-date" id="todayDate"></div>
        <div class="today-time" id="todayTime">--:--:--</div>
        <div class="today-weekday" id="todayWeekday"></div>
      </div>

      <div class="pattern-section">
        <div class="section-label">勤務パターン</div>
        <div class="pattern-grid">
          <div class="pattern-card selected" data-pattern="full" onclick="selectPattern('full',this)">
            <div class="pattern-icon">🌕</div>
            <div class="pattern-name">一　日</div>
            <div class="pattern-sub">終日勤務</div>
          </div>
          <div class="pattern-card" data-pattern="am" onclick="selectPattern('am',this)">
            <div class="pattern-icon">🌅</div>
            <div class="pattern-name">午前のみ</div>
            <div class="pattern-sub">AM勤務</div>
          </div>
          <div class="pattern-card" data-pattern="pm" onclick="selectPattern('pm',this)">
            <div class="pattern-icon">🌇</div>
            <div class="pattern-name">午後のみ</div>
            <div class="pattern-sub">PM勤務</div>
          </div>
        </div>
      </div>

      <div class="status-bar">
        <div class="status-item">
          <div class="status-item-label">現在の状態</div>
          <div id="statusBadgeWrap"><span class="status-badge badge-out"><span class="badge-dot"></span>未出勤</span></div>
        </div>
        <div class="status-item">
          <div class="status-item-label">出　勤</div>
          <div class="status-item-val empty" id="disp-in">--:--</div>
        </div>
        <div class="status-item">
          <div class="status-item-label">昼休み開始</div>
          <div class="status-item-val empty" id="disp-lunchStart">--:--</div>
        </div>
        <div class="status-item">
          <div class="status-item-label">昼休み終了</div>
          <div class="status-item-val empty" id="disp-lunchEnd">--:--</div>
        </div>
        <div class="status-item">
          <div class="status-item-label">退　勤</div>
          <div class="status-item-val empty" id="disp-out">--:--</div>
        </div>
        <div class="status-item">
          <div class="status-item-label">実労働</div>
          <div class="status-item-val empty" id="disp-work">--</div>
        </div>
      </div>

      <div class="section-label">打刻ボタン</div>
      <div class="stamp-grid">
        <button class="washi-btn stamp-btn btn-moss" id="btn-in" onclick="doStamp('in')">
          ▶ 出　勤<span class="stamp-time" id="time-in"></span>
        </button>
        <button class="washi-btn stamp-btn btn-gold" id="btn-lunchStart" onclick="doStamp('lunchStart')" disabled>
          ☕ 昼休み開始<span class="stamp-time" id="time-lunchStart"></span>
        </button>
        <button class="washi-btn stamp-btn btn-gold" id="btn-lunchEnd" onclick="doStamp('lunchEnd')" disabled>
          ▶ 昼休み終了<span class="stamp-time" id="time-lunchEnd"></span>

        <button class="washi-btn stamp-btn btn-vermilion" id="btn-out" onclick="doStamp('out')" disabled>

        <div class="section-label">本日のメモ</div>
        <textarea class="washi-textarea" id="memoInput" placeholder="作業内容や備考などを記入できます..."></textarea>

      <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;">
        <button class="washi-btn btn-outline btn-sm" id="btnReset" onclick="resetToday()" style="display:none;">今日をリセット</button>
        <button class="washi-btn btn-outline btn-sm" onclick="openCorrectModal()">🖊 時刻修正</button>
        <button class="washi-btn btn-indigo btn-sm" onclick="saveMemo()">メモ保存</button>

    <!-- 履歴タブ -->

      <div class="history-filter">
        <div class="month-label" id="histMonthLabel"></div>

      <div class="history-add-bar">
        <button class="washi-btn btn-moss btn-sm" onclick="openAddModal()">＋ この月に記録を追加</button>
      </div>

    <!-- 集計タブ -->

      <div class="history-filter">
        <div class="month-label" id="sumMonthLabel"></div>
      </div>
      <div class="summary-grid" id="summaryCards"></div>

      <div style="background:rgba(255,252,245,0.85);border:1px solid var(--border-l);border-radius:2px;overflow:hidden;overflow-x:auto;-webkit-overflow-scrolling:touch;">
        <table class="washi-table" id="summaryTable">
          <thead><tr>
            <th>日　付</th><th>出勤</th><th>退勤</th><th>昼休み</th><th>実労働</th><th>パターン</th><th>操　作</th>
          </tr></thead>
          <tbody id="summaryTableBody"></tbody>

      </div>

</div>

<!-- 時刻修正モーダル -->
<div class="modal-overlay" id="correctModal">
  <div class="modal">
    <div class="modal-title">時刻修正</div>
    <div class="form-row"><label class="form-label">出勤時刻</label><input class="form-time-input" type="time" id="correct-in"></div>
    <div class="form-row"><label class="form-label">昼休み開始</label><input class="form-time-input" type="time" id="correct-lunchStart"></div>
    <div class="form-row"><label class="form-label">昼休み終了</label><input class="form-time-input" type="time" id="correct-lunchEnd"></div>
    <div class="form-row"><label class="form-label">退勤時刻</label><input class="form-time-input" type="time" id="correct-out"></div>
    <div class="modal-actions">
      <button class="washi-btn btn-outline btn-sm" onclick="closeModal('correctModal')">取消</button>
      <button class="washi-btn btn-vermilion btn-sm" onclick="applyCorrection()">修正を適用</button>

<!-- 履歴編集モーダル -->

    <div class="modal-title">記録編集</div>

    <div class="form-row"><label class="form-label">昼休み開始</label><input class="form-time-input" type="time" id="edit-lunchStart"></div>
    <div class="form-row"><label class="form-label">昼休み終了</label><input class="form-time-input" type="time" id="edit-lunchEnd"></div>
    </div>

<!-- 新規記録追加モーダル -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">記録を追加</div>
    <input type="hidden" id="add-date-hidden">
    <div class="form-row">
      <label class="form-label">日　付</label>

    <div class="form-row">
      <label class="form-label">勤務パターン</label>

<div class="toast-wrap" id="toastWrap"></div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width:360px;text-align:center;">
    <div style="font-size:32px;margin-bottom:12px;" id="confirmIcon">🗑</div>
    <div class="modal-title" style="justify-content:center;" id="confirmTitle">削除の確認</div>
    <div style="font-size:14px;color:var(--ink-faint);font-family:'Noto Sans JP',sans-serif;margin-bottom:24px;line-height:1.8;" id="confirmMsg"></div>

      <button class="washi-btn btn-outline btn-sm" onclick="closeModal('confirmModal')">取　消</button>

<script>
// ====== CUSTOM CONFIRM ======
let _confirmCallback = null;
function showConfirm(msg, icon, callback) {
  _confirmCallback = callback;
  g('confirmMsg').textContent  = msg;
  g('confirmIcon').textContent = icon || '❓';
  g('confirmOkBtn').onclick = () => {
    closeModal('confirmModal');
    if (_confirmCallback) _confirmCallback();
    _confirmCallback = null;
  };
  openModal('confirmModal');
}

// ====== STATE ======
let currentUser = '';
let todayState  = {};
let allRecords  = [];
let histMonth   = new Date(new Date().getFullYear(), new Date().getMonth() - 1, 1);
let sumMonth    = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
let stampDate   = new Date(); // 打刻対象日（デフォルト：今日）
let clockTimer  = null;
let DB          = null;

const STORE      = 'kintai_records';
const LS_RECORDS = 'kintai_all_records';
const LS_USERS   = 'kintai_users';

// ====== IndexedDB ======
function initDB() {
  return new Promise(resolve => {
    const req = indexedDB.open('KintaiDB', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE))
        db.createObjectStore(STORE, { keyPath: 'id' });
    };
    req.onsuccess = e => { DB = e.target.result; resolve(); };
    req.onerror   = () => resolve();
  });
}
function idbSaveAll() {
  if (!DB) return;
  const tx = DB.transaction(STORE, 'readwrite');
  const st = tx.objectStore(STORE);
  st.clear();
  allRecords.forEach(r => st.put(r));
}
function idbLoadAll() {
  return new Promise(resolve => {
    if (!DB) { resolve([]); return; }
    const req = DB.transaction(STORE, 'readonly').objectStore(STORE).getAll();
    req.onsuccess = e => resolve(e.target.result || []);
    req.onerror   = () => resolve([]);
  });
}

// ====== LS helpers ======
function lsSave()         { try { localStorage.setItem(LS_RECORDS, JSON.stringify(allRecords)); } catch(e) {} }
function lsLoad()         { try { return JSON.parse(localStorage.getItem(LS_RECORDS) || '[]'); } catch(e) { return []; } }
function lsSaveUsers(u)   { try { localStorage.setItem(LS_USERS, JSON.stringify(u)); } catch(e) {} }
function lsLoadUsers()    { try { return JSON.parse(localStorage.getItem(LS_USERS) || '[]'); } catch(e) { return []; } }

// ====== Dual save ======
function persistRecord(rec) {
  const i = allRecords.findIndex(r => r.id === rec.id);
  if (i >= 0) allRecords[i] = rec; else allRecords.push(rec);
  lsSave(); idbSaveAll();
}
function removeRecord(id) {
  allRecords = allRecords.filter(r => r.id !== id);
  lsSave(); idbSaveAll();
}

// ====== INIT ======
async function appInit() {
  await initDB();
  const idb = await idbLoadAll();
  const ls  = lsLoad();
  allRecords = idb.length >= ls.length ? idb : ls;
  if (idb.length < ls.length) idbSaveAll();

  buildNameList();
  const ni = document.getElementById('nameInput');
  ni.addEventListener('keydown', e => { if (e.key === 'Enter') startSession(); });
  ni.addEventListener('input', e => buildNameList(e.target.value));
}

// ====== NAME SCREEN ======
function buildNameList(filter) {
  const users = lsLoadUsers();
  const query = (filter || '').trim();
  if (!query) { listEl.innerHTML = ''; return; }
  const filtered = users.filter(u => u.toLowerCase().includes(query.toLowerCase()));

  const listEl = document.getElementById('nameList');
  if (filtered.length === 0) { listEl.innerHTML = ''; return; }
  const items = filtered.map(u => {
    let display = esc(u);
    if (query) {
      const idx = u.toLowerCase().indexOf(query.toLowerCase());
      if (idx >= 0) {
        display = esc(u.slice(0,idx)) + '<mark>' + esc(u.slice(idx, idx+query.length)) + '</mark>' + esc(u.slice(idx+query.length));
      }
    }
    return `<button class="name-chip" onclick="selectName('${esc(u)}')">${display}</button>`;
  }).join('');
  listEl.innerHTML = `<div class="name-suggest">${items}</div>`;
}
function selectName(n) {
  document.getElementById('nameInput').value = n;
  document.getElementById('nameList').innerHTML = '';

}

function startSession() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { toast('お名前を入力してください', '⚠'); return; }
  currentUser = name;
  const users = lsLoadUsers();
  if (!users.includes(name)) { users.unshift(name); lsSaveUsers(users); }
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('mainScreen').classList.add('active');
  document.getElementById('headerUser').textContent = name;
  stampDate = new Date();
  initStampDateUI();
  loadStampState();
  startClock();
  renderHistory();
  renderSummary();
}
function logout() {
  clearInterval(clockTimer);
  currentUser = '';
  document.getElementById('nameScreen').style.display = '';
  document.getElementById('mainScreen').classList.remove('active');
  document.getElementById('nameInput').value = '';
  buildNameList();
}

// ====== TODAY STATE ======
function stampKey()    { return `kintai_today_${currentUser}_${dateStr(stampDate)}`; }
function loadStampState() {
  try { const s = localStorage.getItem(stampKey()); todayState = s ? JSON.parse(s) : defaultState(); }
  catch(e) { todayState = defaultState(); }
  // 過去日に既存レコードがあればそちらを優先表示
  const existing = allRecords.find(r => r.id === `${currentUser}_${dateStr(stampDate)}`);
  if (existing && !todayState.in) {
    todayState = { ...defaultState(), ...existing, status: existing.out ? 'done' : (existing.lunchEnd ? 'afterLunch' : (existing.lunchStart ? 'lunch' : (existing.in ? 'in' : 'out'))) };
  }
  applyUI();
}
function saveTodayLS() { try { localStorage.setItem(stampKey(), JSON.stringify(todayState)); } catch(e) {} }
function defaultState() { return { pattern:'full', status:'out', in:'', lunchStart:'', lunchEnd:'', out:'', memo:'' }; }

function applyUI() {
  // Pattern cards
  document.querySelectorAll('.pattern-card').forEach(c =>
    c.classList.toggle('selected', c.dataset.pattern === todayState.pattern)
  );
  // Status badge
  const B = {
    out:        '<span class="status-badge badge-out"><span class="badge-dot"></span>未出勤</span>',
    in:         '<span class="status-badge badge-in"><span class="badge-dot"></span>勤務中</span>',
    lunch:      '<span class="status-badge badge-break"><span class="badge-dot"></span>昼休み中</span>',
    afterLunch: '<span class="status-badge badge-in"><span class="badge-dot"></span>午後勤務中</span>',
    done:       '<span class="status-badge badge-done"><span class="badge-dot"></span>退勤済</span>',
  };
  document.getElementById('statusBadgeWrap').innerHTML = B[todayState.status] || B.out;
  // Dispay times
  setDisp('in',         todayState.in);
  setDisp('lunchStart', todayState.lunchStart);
  setDisp('lunchEnd',   todayState.lunchEnd);
  setDisp('out',        todayState.out);
  const wm = calcWorkMins({ in:todayState.in, lunchStart:todayState.lunchStart, lunchEnd:todayState.lunchEnd, out:todayState.out });
  document.getElementById('disp-work').textContent = wm ? minsToHm(wm) : '--';
  document.getElementById('disp-work').classList.toggle('empty', !wm);
  // Stamp labels
  ['in','lunchStart','lunchEnd','out'].forEach(k => {
    const el2 = document.getElementById(`time-${k}`);
    if (el2) el2.textContent = todayState[k] ? `打刻済: ${todayState[k]}` : '';
  });
  // Memo
  document.getElementById('memoInput').value = todayState.memo || '';
  // Buttons
  const st  = todayState.status;
  const pat = todayState.pattern;
  g('btn-in').disabled         = st !== 'out';
  g('btn-lunchStart').disabled = !(st === 'in' && pat === 'full');
  g('btn-lunchEnd').disabled   = st !== 'lunch';
  g('btn-out').disabled        = !(st === 'afterLunch' || (st === 'in' && pat !== 'full'));
  g('btnReset').style.display  = st !== 'out' ? '' : 'none';
}
function setDisp(key, val) {
  const el2 = document.getElementById(`disp-${key}`);
  if (!el2) return;
  el2.textContent = val || '--:--';
  el2.classList.toggle('empty', !val);
}

// ====== PATTERN & STAMP ======
function selectPattern(pat, card) {
  if (todayState.status !== 'out') { toast('出勤後はパターン変更できません', '⚠'); return; }
  todayState.pattern = pat;
  saveTodayLS();
  applyUI();
}

function doStamp(type) {
  const isPast = dateStr(stampDate) !== dateStr(new Date());

  if (isPast) {
    // 過去日：時刻入力モーダルを開いてその場で登録
    openPastStampModal(type);
    return;
  }

  // 当日：通常打刻
  const actual  = new Date();
  const rounded = fmtTime(actual);
  const raw     = `${pad(actual.getHours())}:${pad(actual.getMinutes())}`;
  const suffix  = raw !== rounded ? ` （${raw}→${rounded}）` : '';

  if (type === 'in')         { todayState.in = rounded;         todayState.status = 'in';         toast(`出勤を打刻しました${suffix}`, '✅'); }
  if (type === 'lunchStart') { todayState.lunchStart = rounded; todayState.status = 'lunch';       toast(`昼休み開始を打刻しました${suffix}`, '☕'); }
  if (type === 'lunchEnd')   { todayState.lunchEnd = rounded;   todayState.status = 'afterLunch';  toast(`昼休み終了を打刻しました${suffix}`, '▶'); }
  if (type === 'out')        { todayState.out = rounded;        todayState.status = 'done';        commitRecord(); toast(`退勤を打刻しました${suffix}　お疲れさまでした！`, '🏯'); }
  saveTodayLS();
  applyUI();
}

// ====== 過去日打刻モーダル ======
let _pastStampType = '';
function openPastStampModal(type) {
  _pastStampType = type;
  const LABELS = { in:'出勤時刻', lunchStart:'昼休み開始', lunchEnd:'昼休み終了', out:'退勤時刻' };
  const DEFAULTS = { in:'09:00', lunchStart:'12:00', lunchEnd:'13:00', out:'18:00' };
  g('pastStampLabel').textContent = LABELS[type] || '時刻';
  g('pastStampTime').value = todayState[type] || DEFAULTS[type] || '09:00';
  const ds = dateStr(stampDate);
  const WD = ['日','月','火','水','木','金','土'];
  const dt = new Date(ds + 'T00:00:00');
  g('pastStampDateDisp').textContent = `${dt.getMonth()+1}月${dt.getDate()}日（${WD[dt.getDay()]}）の${LABELS[type]}`;
  openModal('pastStampModal');
  setTimeout(() => g('pastStampTime').focus(), 100);
}
function savePastStamp() {
  const val = g('pastStampTime').value;
  if (!val) { toast('時刻を入力してください', '⚠'); return; }
  const type = _pastStampType;
  if (type === 'in')         { todayState.in = val;         todayState.status = 'in'; }
  if (type === 'lunchStart') { todayState.lunchStart = val; todayState.status = 'lunch'; }
  if (type === 'lunchEnd')   { todayState.lunchEnd = val;   todayState.status = 'afterLunch'; }
  if (type === 'out')        { todayState.out = val;        todayState.status = 'done'; commitRecord(); }
  saveTodayLS();
  applyUI();
  closeModal('pastStampModal');
  const LABELS = { in:'出勤', lunchStart:'昼休み開始', lunchEnd:'昼休み終了', out:'退勤' };
  toast(`${LABELS[type]}（${val}）を登録しました`, '✅');
}

function commitRecord() {
  const ds = dateStr(stampDate);
  const rec = {
    id:         `${currentUser}_${ds}`,
    user:       currentUser,
    date:       ds,
    pattern:    todayState.pattern,
    in:         todayState.in,
    lunchStart: todayState.lunchStart,
    lunchEnd:   todayState.lunchEnd,
    out:        todayState.out,
    memo:       todayState.memo,
  };
  persistRecord(rec);
  renderHistory();
  renderSummary();
}

function saveMemo() {
  todayState.memo = document.getElementById('memoInput').value;
  saveTodayLS();
  const ds = dateStr(stampDate);

}

function resetToday() {
  const ds = dateStr(stampDate);

// ====== SUMMARY ======
function renderSummary() {
  const y = sumMonth.getFullYear(), m = sumMonth.getMonth();
  document.getElementById('sumMonthLabel').textContent = `${y}年${m+1}月`;

  // その月の記録をdate→recのMapに
  const recMap = {};
  allRecords.filter(r => {
    const d = new Date(r.date);
    return d.getFullYear()===y && d.getMonth()===m && r.user===currentUser;
  }).forEach(r => recMap[r.date] = r);

  // 集計カード（記録済み行のみ）
  const recs   = Object.values(recMap);
  const total   = recs.length;
  const totMins = recs.reduce((s,r) => s + calcWorkMins(r), 0);
  // 18時以降の勤務時間を集計
  const after18Mins = recs.reduce((s,r) => {
    if (!r.out) return s;
    const outMins = timeToMins(r.out);
    const threshold = 18 * 60; // 18:00
    if (outMins <= threshold) return s;
    // 18時以降の勤務開始点を求める（昼休みが18時以降にかかるケースは稀なので退勤時刻のみで計算）
    return s + (outMins - threshold);
  }, 0);
  const after18Days = recs.filter(r => r.out && timeToMins(r.out) > 18*60).length;
  document.getElementById('summaryCards').innerHTML = `
    <div class="summary-card sc-moss"><div class="sc-label">出勤日数</div><div class="sc-value">${total}<sup>日</sup></div>
      <div class="sc-sub">一日: ${recs.filter(r=>r.pattern==='full').length}日 / 午前: ${recs.filter(r=>r.pattern==='am').length}日 / 午後: ${recs.filter(r=>r.pattern==='pm').length}日</div></div>
    <div class="summary-card sc-indigo"><div class="sc-label">総労働時間</div><div class="sc-value">${minsToH(totMins)}<sup>h</sup></div><div class="sc-sub">${minsToHm(totMins)}</div></div>
    <div class="summary-card sc-vermilion"><div class="sc-label">18時以降の勤務時間</div><div class="sc-value">${after18Mins ? minsToH(after18Mins) : '--'}<sup>${after18Mins?'h':''}</sup></div>
      <div class="sc-sub">${after18Mins ? minsToHm(after18Mins)+'（'+after18Days+'日)' : '該当なし'}</div></div>
  `;

  // 月内の全日付をカレンダー展開
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const todayStr    = dateStr(new Date());
  const WD = ['日','月','火','水','木','金','土'];
  const PL = { full:'一日', am:'午前のみ', pm:'午後のみ' };
  const PC = { full:'pb-full', am:'pb-am', pm:'pb-pm' };

  const tbody = g('summaryTableBody');
  let rows = '';
  for (let day = 1; day <= daysInMonth; day++) {
    const dt  = new Date(y, m, day);
    const ds  = dateStr(dt);
    const wd  = dt.getDay(); // 0=日,6=土
    const r   = recMap[ds];
    const isToday   = ds === todayStr;
    const isWeekend = wd === 0 || wd === 6;
    const wdLabel   = WD[wd];
    const wdClass   = wd===0 ? 'cal-day-sun' : (wd===6 ? 'cal-day-sat' : '');
    let rowClass = isToday ? 'row-today' : (isWeekend ? 'row-weekend' : '');

    if (r) {
      const lunchMins = (r.lunchStart && r.lunchEnd)
        ? timeToMins(r.lunchEnd) - timeToMins(r.lunchStart) : 0;
      rows += `<tr class="${rowClass}">
        <td><span class="cal-date">${m+1}/${day}</span><span class="cal-day ${wdClass}">（${wdLabel}）</span></td>
        <td>${r.in||'--'}</td>
        <td>${r.out||'--'}</td>
        <td>${lunchMins ? lunchMins+'分' : '--'}</td>
        <td>${minsToHm(calcWorkMins(r))}</td>
        <td><span class="pattern-badge ${PC[r.pattern]||''}">${PL[r.pattern]||''}</span></td>
        <td style="white-space:nowrap;">
          <button class="icon-btn" data-rid="${esc(r.id)}" onclick="openEditModal(this.dataset.rid)" title="編集">🖊</button>
          <button class="icon-btn danger" data-rid="${esc(r.id)}" onclick="confirmDeleteSum(this.dataset.rid)" title="削除">✕</button>
        </td>
      </tr>`;
    } else {
      rowClass += (rowClass ? ' ' : '') + 'row-empty';
      rows += `<tr class="${rowClass}">
        <td><span class="cal-date">${m+1}/${day}</span><span class="cal-day ${wdClass}">（${wdLabel}）</span></td>
        <td>--</td><td>--</td><td>--</td><td>--</td><td>--</td>
        <td><button class="btn-add-row" data-ds="${ds}" onclick="openAddModalForDate(this.dataset.ds)">＋ 追加</button></td>
      </tr>`;
    }
  }
  tbody.innerHTML = rows;
}

function confirmDeleteSum(id) {

    removeRecord(id); renderSummary(); renderHistory();
    toast('記録を削除しました', '🗑');

function saveAdd() {
  const ds  = g('add-date').value;
  if (!ds) { toast('日付を選択してください', '⚠'); return; }
  const rec = {
    id:         `${currentUser}_${ds}`,

    date:       ds,

    in:         g('add-in').value,

  };

    return;
  }
  _doSaveAdd(rec);
}
function _doSaveAdd(rec) {
  const ds = rec.date;
  persistRecord(rec);
  // 今日の記録が更新された場合はtodayStateも同期
  if (ds === dateStr(new Date()) && rec.user === currentUser) {
    Object.assign(todayState, rec);
    todayState.status = rec.out ? 'done' : (rec.lunchEnd ? 'afterLunch' : (rec.lunchStart ? 'lunch' : (rec.in ? 'in' : 'out')));
    saveTodayLS(); applyUI();
  }
  renderHistory();
  renderSummary();
  closeModal('addModal');
  toast(`${fmtDateJP(ds).replace(/（.）/,'')} の記録を追加しました`, '✅');
}
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  g(`panel-${name}`).classList.add('active');
  if (name==='history') renderHistory();
  if (name==='summary') renderSummary();
}

// ====== MODALS ======
function openModal(id) { g(id).classList.add('open'); }
function closeModal(id) { g(id).classList.remove('open'); }
document.addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) closeModal(e.target.id); });

// ====== TOAST ======
function toast(msg, icon='●') {
  const wrap = g('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

// ====== UTILS ======
function g(id)       { return document.getElementById(id); }
function pad(n)      { return String(n).padStart(2,'0'); }
function dateStr(d)  { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
// 5分刻み四捨五入（例: 9:03→9:05, 9:07→9:05, 9:08→9:10）
function roundTo5(d) {
  const totalMins = d.getHours() * 60 + d.getMinutes();
  const rounded   = Math.round(totalMins / 5) * 5;
  const h = Math.floor(rounded / 60) % 24;
  const m = rounded % 60;
  return { h, m };
}
function fmtTime(d) {
  const { h, m } = roundTo5(d);
  return `${pad(h)}:${pad(m)}`;
}
function esc(s)      { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtDateJP(s) {
  if (!s) return '';
  const d  = new Date(s+'T00:00:00');
  const WD = ['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`;
}
function timeToMins(t) { if (!t) return 0; const [h,m]=t.split(':').map(Number); return h*60+m; }
function calcWorkMins(r) {
  if (!r||!r.in||!r.out) return 0;
  let total = timeToMins(r.out) - timeToMins(r.in);
  if (r.lunchStart && r.lunchEnd) total -= (timeToMins(r.lunchEnd) - timeToMins(r.lunchStart));
  return Math.max(0, total);
}
function minsToHm(m) { if (!m) return '--'; return `${Math.floor(m/60)}h${pad(m%60)}m`; }
function minsToH(m)  { return (m/60).toFixed(1); }

appInit();
</script>
